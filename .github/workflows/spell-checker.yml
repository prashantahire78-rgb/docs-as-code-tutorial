name: Spell Checker

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - '*'
  workflow_dispatch:

jobs:
  spellcheck:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install cspell
        run: npm install -g cspell

      - name: Run spelling check
        run: cspell "docs/**/*.{md,mdx}"